<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정밀 SD 캐릭터 메이커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; color: #1e293b; }
        .tab-active { background-color: #4f46e5 !important; color: white !important; transform: translateY(-2px); }
        .item-card { transition: all 0.2s ease; cursor: pointer; border-radius: 20px; background: white; border: 2px solid #e2e8f0; overflow: hidden; }
        .item-card:hover { border-color: #6366f1; transform: translateY(-3px); }
        .selected-item { border-color: #4f46e5 !important; background: #eef2ff; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1); }
        #canvas-container { position: relative; width: 100%; max-width: 500px; aspect-ratio: 1/1.1; background: #fff; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); overflow: hidden; margin: 0 auto; border: 4px solid white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-btn { @apply px-5 py-3 rounded-2xl bg-white text-slate-500 font-bold transition-all border border-slate-200 shadow-sm whitespace-nowrap hover:bg-slate-50; }
        .slider-control { @apply w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600; }
    </style>
</head>
<body class="p-4 md:p-8">

<script>
    const ASSETS = {
        bodyColor: ['#FFF8F0', '#FFE9D1', '#FFD8B1', '#F5CBA7', '#E5AA70'],
        // 두상 및 신체 (image_b4e123 참고하여 완벽한 원형 두상 설계)
        bodyBase: {
            face: 'M50 45 C22 45 18 115 18 135 C18 165 35 180 50 180 C65 180 82 165 82 135 C82 115 78 45 50 45 Z',
            body: `
                <path d="M48 175 V185 H52 V175" fill="currentColor"/> <!-- 목 -->
                <path d="M40 185 Q50 183 60 185 L65 215 Q50 222 35 215 Z" fill="currentColor"/> <!-- 상체 -->
                <path d="M40 187 L30 210 Q28 215 33 217 L42 195" fill="currentColor"/> <!-- 왼팔 -->
                <path d="M60 187 L70 210 Q72 215 67 217 L58 195" fill="currentColor"/> <!-- 오른팔 -->
                <path d="M35 215 L35 255 Q42 260 48 255 V215 Z" fill="currentColor"/> <!-- 왼다리 -->
                <path d="M52 215 V255 Q58 260 65 255 L65 215 Z" fill="currentColor"/> <!-- 오른다리 -->
            `
        },
        eyes: [
            { id: 'e1', name: '순수한 눈', svg: '<g transform="translate(0,25)"><circle cx="36" cy="115" r="7" fill="#333"/><circle cx="38" cy="112" r="2.5" fill="white"/><circle cx="64" cy="115" r="7" fill="#333"/><circle cx="66" cy="112" r="2.5" fill="white"/></g>' },
            { id: 'e2', name: '초롱초롱', svg: '<g transform="translate(0,25)"><circle cx="36" cy="115" r="8" fill="#333"/><path d="M34 113 A1 1 0 0 1 38 113" fill="white"/><circle cx="64" cy="115" r="8" fill="#333"/><path d="M62 113 A1 1 0 0 1 66 113" fill="white"/></g>' }
        ],
        nose: [
            { id: 'n1', name: '작은 코', svg: '<circle cx="50" cy="142" r="1.5" fill="#e5aa70" opacity="0.6"/>' },
            { id: 'none', name: '코 없음', svg: '' }
        ],
        mouth: [
            { id: 'm1', name: '방긋', svg: '<path d="M46 155 Q50 160 54 155" fill="none" stroke="#e76f51" stroke-width="2" stroke-linecap="round"/>' },
            { id: 'm2', name: '헤-', svg: '<path d="M45 155 Q50 165 55 155 Z" fill="#e76f51"/>' }
        ],
        hair: [
            { id: 'h1', name: '초코 단발', back: '<path d="M18 120 V210 Q50 230 82 210 V120 Z" fill="#4b3832"/>', front: '<path d="M18 125 Q18 45 50 45 Q82 45 82 125 L85 145 Q50 115 15 145 Z" fill="#4b3832"/>' },
            { id: 'h2', name: '만두 리본', back: '<circle cx="50" cy="40" r="18" fill="#222"/>', front: '<path d="M18 130 Q18 48 50 48 Q82 48 82 130 Z" fill="#222"/><path d="M42 42 L50 58 L58 42 Z" fill="#ff4d6d"/>' }
        ],
        tops: [
            { id: 't1', name: '조끼 수트', svg: `
                <path d="M40 185 H60 L65 215 H35 Z" fill="#d4b996"/>
                <path d="M40 185 L50 205 L60 185" fill="#fff"/>
                <circle cx="50" cy="195" r="1" fill="#555"/><circle cx="50" cy="203" r="1" fill="#555"/>
                <path d="M40 185 L30 210 L38 215 L43 195" fill="#fff"/>
                <path d="M60 185 L70 210 L62 215 L57 195" fill="#fff"/>
            ` },
            { id: 't2', name: '핑크 티셔츠', svg: '<path d="M40 185 H60 L63 215 H37 Z" fill="#ffafcc"/><path d="M40 185 L32 205 L38 210" fill="#ffafcc"/><path d="M60 185 L68 205 L62 210" fill="#ffafcc"/>' }
        ],
        bottoms: [
            { id: 'bt1', name: '스쿨 치마', svg: '<path d="M35 215 H65 L75 245 Q50 255 25 245 Z" fill="#457b9d"/><path d="M45 215 V248 M55 215 V248" stroke="rgba(255,255,255,0.2)"/>' },
            { id: 'bt2', name: '청바지', svg: '<path d="M35 215 H65 V255 Q50 260 35 255 Z" fill="#2a9d8f"/><path d="M50 215 V258" stroke="rgba(0,0,0,0.1)"/>' }
        ],
        glasses: [
            { id: 'g1', name: '동글 안경', svg: '<g transform="translate(0,25)" fill="none" stroke="#333" stroke-width="1.5"><circle cx="36" cy="115" r="10"/><circle cx="64" cy="115" r="10"/><path d="M46 115 H54"/></g>' },
            { id: 'g2', name: '뿔테 안경', svg: '<g transform="translate(0,25)" fill="none" stroke="#222" stroke-width="2.5"><rect x="25" y="105" width="20" height="18" rx="3"/><rect x="55" y="105" width="20" height="18" rx="3"/><path d="M45 112 H55"/></g>' }
        ],
        backgrounds: [
            { id: 'bg1', name: '심플 화이트', css: '#ffffff' },
            { id: 'bg2', name: '파스텔 블루', css: 'linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%)' },
            { id: 'bg3', name: '라벤더 가든', css: 'linear-gradient(135deg, #f5f3ff 0%, #ddd6fe 100%)' }
        ]
    };
</script>

<div class="max-w-7xl mx-auto flex flex-col xl:flex-row gap-8 items-center xl:items-start">
    
    <!-- 캔버스 영역 -->
    <div class="w-full max-w-[500px] flex flex-col gap-6">
        <div id="canvas-container">
            <div id="main-bg" class="absolute inset-0 transition-all"></div>
            <svg id="character-svg" viewBox="0 0 100 300" class="relative w-full h-full origin-center">
                <g id="master-scale" transform="translate(0,0) scale(1)">
                    <g id="layer-hair-back"></g>
                    <g id="layer-body">
                        <g id="svg-body-base"></g>
                    </g>
                    <g id="layer-bottom" class="clothes-layer"></g>
                    <g id="layer-top" class="clothes-layer"></g>
                    <g id="layer-face">
                        <path id="svg-face-shape" />
                        <g id="svg-eyes"></g>
                        <g id="svg-nose"></g>
                        <g id="svg-mouth"></g>
                    </g>
                    <g id="layer-hair-front"></g>
                    <g id="layer-acc"></g>
                </g>
            </svg>
        </div>

        <!-- 조절 패널 -->
        <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-200 flex flex-col gap-6">
            <div>
                <div class="flex justify-between mb-2">
                    <span class="font-bold text-slate-700 text-sm">전체 캐릭터 크기</span>
                    <span id="zoom-val" class="text-indigo-600 font-black">100%</span>
                </div>
                <input type="range" id="zoom-slider" min="0.5" max="1.5" step="0.01" value="1" class="slider-control">
            </div>
            
            <div>
                <div class="flex justify-between mb-2">
                    <span class="font-bold text-slate-700 text-sm">의상 사이즈 커스텀</span>
                    <span id="cloth-val" class="text-emerald-500 font-black">100%</span>
                </div>
                <input type="range" id="cloth-slider" min="0.8" max="1.3" step="0.01" value="1" class="slider-control accent-emerald-500">
            </div>

            <div class="flex gap-3">
                <button onclick="randomize()" class="flex-1 bg-slate-100 hover:bg-slate-200 py-4 rounded-2xl font-bold transition-all">무작위 🎲</button>
                <button onclick="saveImage()" class="flex-2 bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">저장하기 📸</button>
            </div>
        </div>
    </div>

    <!-- 메뉴 영역 -->
    <div class="flex-1 w-full bg-white rounded-[40px] shadow-xl border border-slate-100 overflow-hidden flex flex-col h-[850px]">
        <div class="flex overflow-x-auto no-scrollbar p-6 gap-3 bg-slate-50 border-b border-slate-200">
            <button onclick="showCat('face')" id="tab-face" class="category-btn tab-active">표정/안경</button>
            <button onclick="showCat('hair')" id="tab-hair" class="category-btn">헤어스타일</button>
            <button onclick="showCat('top')" id="tab-top" class="category-btn">상의</button>
            <button onclick="showCat('bottom')" id="tab-bottom" class="category-btn">하의</button>
            <button onclick="showCat('bg')" id="tab-bg" class="category-btn">배경설정</button>
            <button onclick="showCat('body')" id="tab-body" class="category-btn">피부색</button>
        </div>

        <div id="item-list" class="flex-1 overflow-y-auto p-8 grid grid-cols-2 lg:grid-cols-3 gap-6 content-start"></div>
    </div>
</div>

<script>
    let state = {
        bodyColor: ASSETS.bodyColor[0],
        eyes: ASSETS.eyes[0].id,
        nose: ASSETS.nose[0].id,
        mouth: ASSETS.mouth[0].id,
        hair: ASSETS.hair[0].id,
        top: ASSETS.tops[0].id,
        bottom: ASSETS.bottoms[0].id,
        glasses: null,
        bg: ASSETS.backgrounds[1].id,
        zoom: 1,
        clothScale: 1
    };

    // 슬라이더 이벤트
    document.getElementById('zoom-slider').oninput = (e) => {
        state.zoom = e.target.value;
        document.getElementById('zoom-val').innerText = Math.round(state.zoom * 100) + '%';
        refresh();
    };

    document.getElementById('cloth-slider').oninput = (e) => {
        state.clothScale = e.target.value;
        document.getElementById('cloth-val').innerText = Math.round(state.clothScale * 100) + '%';
        refresh();
    };

    function showCat(cat) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('tab-active'));
        document.getElementById('tab-' + cat).classList.add('tab-active');
        const list = document.getElementById('item-list');
        list.innerHTML = '';

        if(cat === 'face') {
            renderTitle('눈'); renderItems(ASSETS.eyes, 'eyes');
            renderTitle('코'); renderItems(ASSETS.nose, 'nose');
            renderTitle('입'); renderItems(ASSETS.mouth, 'mouth');
            renderTitle('안경'); renderItems(ASSETS.glasses, 'glasses');
        } else if(cat === 'body') {
            ASSETS.bodyColor.forEach(c => {
                const d = document.createElement('div');
                d.className = `h-20 rounded-2xl cursor-pointer border-4 ${state.bodyColor === c ? 'border-indigo-500' : 'border-white'}`;
                d.style.backgroundColor = c;
                d.onclick = () => { state.bodyColor = c; refresh(); showCat('body'); };
                list.appendChild(d);
            });
        } else if(cat === 'bg') {
            ASSETS.backgrounds.forEach(b => {
                const d = document.createElement('div');
                d.className = `h-24 rounded-2xl cursor-pointer border-4 flex items-center justify-center font-bold text-xs ${state.bg === b.id ? 'border-indigo-500' : 'border-white'}`;
                d.style.background = b.css;
                d.innerText = b.name;
                d.onclick = () => { state.bg = b.id; refresh(); showCat('bg'); };
                list.appendChild(d);
            });
        } else {
            const map = { hair: ASSETS.hair, top: ASSETS.tops, bottom: ASSETS.bottoms };
            renderItems(map[cat], cat);
        }
    }

    function renderTitle(txt) {
        const h = document.createElement('h3');
        h.className = 'col-span-full font-black text-slate-400 text-xs uppercase tracking-widest mt-4';
        h.innerText = txt;
        document.getElementById('item-list').appendChild(h);
    }

    function renderItems(items, key) {
        const list = document.getElementById('item-list');
        items.forEach(item => {
            const card = document.createElement('div');
            const isSel = state[key] === item.id;
            card.className = `item-card p-4 flex flex-col items-center gap-3 ${isSel ? 'selected-item' : ''}`;
            card.onclick = () => { state[key] = (state[key] === item.id && key === 'glasses') ? null : item.id; refresh(); showCat(getActiveTab()); };
            
            let vBox = "20 40 60 140";
            if(['top', 'bottom'].includes(key)) vBox = "20 180 60 80";

            card.innerHTML = `<div class="w-full aspect-square bg-slate-50 rounded-xl overflow-hidden"><svg viewBox="${vBox}" class="w-full h-full">${item.back || ''}${item.svg || ''}${item.front || ''}</svg></div><span class="text-xs font-bold text-slate-500">${item.name}</span>`;
            list.appendChild(card);
        });
    }

    function getActiveTab() {
        return document.querySelector('.tab-active').id.replace('tab-', '');
    }

    function refresh() {
        // 배경 업데이트
        const bg = ASSETS.backgrounds.find(b => b.id === state.bg);
        document.getElementById('main-bg').style.background = bg.css;

        // 마스터 스케일 (중앙 유지)
        const master = document.getElementById('master-scale');
        master.setAttribute('transform', `translate(${50 - 50*state.zoom}, ${150 - 150*state.zoom}) scale(${state.zoom})`);

        // 신체
        const base = ASSETS.bodyBase;
        document.getElementById('svg-body-base').innerHTML = base.body;
        document.getElementById('svg-body-base').setAttribute('fill', state.bodyColor);
        document.getElementById('svg-face-shape').setAttribute('d', base.face);
        document.getElementById('svg-face-shape').setAttribute('fill', state.bodyColor);

        // 의상 개별 스케일 (가슴/허리 기준점 50, 190)
        const cScale = state.clothScale;
        const cTrans = `translate(${50 - 50*cScale}, ${190 - 190*cScale}) scale(${cScale})`;
        document.getElementById('layer-top').setAttribute('transform', cTrans);
        document.getElementById('layer-bottom').setAttribute('transform', cTrans);

        // 의상 데이터
        document.getElementById('layer-top').innerHTML = (ASSETS.tops.find(t => t.id === state.top) || {svg:''}).svg;
        document.getElementById('layer-bottom').innerHTML = (ASSETS.bottoms.find(b => b.id === state.bottom) || {svg:''}).svg;

        // 헤어 및 얼굴
        const hair = ASSETS.hair.find(h => h.id === state.hair);
        document.getElementById('layer-hair-back').innerHTML = hair.back;
        document.getElementById('layer-hair-front').innerHTML = hair.front;
        document.getElementById('svg-eyes').innerHTML = ASSETS.eyes.find(e => e.id === state.eyes).svg;
        document.getElementById('svg-nose').innerHTML = (ASSETS.nose.find(n => n.id === state.nose) || {svg:''}).svg;
        document.getElementById('svg-mouth').innerHTML = ASSETS.mouth.find(m => m.id === state.mouth).svg;
        
        // 안경
        const gls = ASSETS.glasses.find(g => g.id === state.glasses);
        document.getElementById('layer-acc').innerHTML = gls ? gls.svg : '';
    }

    function randomize() {
        state.bodyColor = ASSETS.bodyColor[Math.floor(Math.random() * ASSETS.bodyColor.length)];
        state.eyes = ASSETS.eyes[Math.floor(Math.random() * ASSETS.eyes.length)].id;
        state.hair = ASSETS.hair[Math.floor(Math.random() * ASSETS.hair.length)].id;
        state.top = ASSETS.tops[Math.floor(Math.random() * ASSETS.tops.length)].id;
        state.bottom = ASSETS.bottoms[Math.floor(Math.random() * ASSETS.bottoms.length)].id;
        refresh();
    }

    function saveImage() {
        const svg = document.getElementById('character-svg');
        const bg = document.getElementById('main-bg');
        const source = new XMLSerializer().serializeToString(svg);
        const canvas = document.createElement('canvas');
        canvas.width = 1000; canvas.height = 1100;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(source);
        img.onload = () => {
            // 배경 그리기 (그라데이션 등 단순화)
            ctx.fillStyle = bg.style.background.includes('gradient') ? '#bae6fd' : bg.style.background;
            ctx.fillRect(0,0,1000,1100);
            ctx.drawImage(img, 0, 0, 1000, 1100);
            const a = document.createElement('a');
            a.download = `my_sd_char.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
        };
    }

    window.onload = () => { refresh(); showCat('face'); };
</script>

</body>
</html>
